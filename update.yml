name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间午夜自动运行
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮手动运行

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.10'

      - name: Install scholarly
        run: pip install scholarly

      - name: Run python script
        run: python fetch_citations.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add citations.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update citations" && git push)
